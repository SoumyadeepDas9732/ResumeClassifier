<!DOCTYPE html>

<html>

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>
Resume Screening System
</title>
<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-4">

    <div class="navbar-custom">

        <div class="brand">
            AI Resume Screening
        </div>

        <button
        id="themeToggle"
        class="btn btn-outline-light theme-btn">

            🌙 Theme

        </button>

    </div>

    <div class="card hero-box">

        <h1 class="title">

            Smart Resume Screening System

        </h1>

        <p class="subtitle">

            Upload multiple resumes and let AI
            classify, score and rank candidates.

        </p>

        <form
        method="POST"
        action="/upload"
        enctype="multipart/form-data">

            <input
            class="form-control mb-3"
            type="file"
            name="resume"
            multiple>

            <button
            class="btn btn-primary btn-lg">

                Analyze Resumes

            </button>

        </form>

    </div>

    <div class="row mt-5">

        <div class="col-md-4">

            <div class="card feature-card">

                <div class="feature-icon">
                    🤖
                </div>

                <h5>AI Classification</h5>

                <p>
                    Automatic role prediction
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card feature-card">

                <div class="feature-icon">
                    📊
                </div>

                <h5>Analytics Dashboard</h5>

                <p>
                    Candidate insights
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card feature-card">

                <div class="feature-icon">
                    📄
                </div>

                <h5>Resume Parsing</h5>

                <p>
                    Skills, email, phone extraction
                </p>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='theme.js') }}"></script>

</body>


</html>
